<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeekUI Control Center</title>
    <link rel="stylesheet" href="popup.css">
    <!-- Include Inter font to match Swiss aesthetics -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>
</head>

<body>
    <div class="control-center">
        <button id="toggle-inspect-btn">
            Toggle Inspector (Alt/⌥ + X)
        </button>
        <div class="quick-tips">
            <div class="tip-item"><span>Ctrl/⌘ + S</span> : Save Element to Stash</div>
            <div class="tip-item"><span>Space</span> : Quick Copy CSS</div>
            <div class="tip-item"><span>Shift + Space</span> : Copy Tailwind CSS</div>
            <div class="tip-item"><span>Hold Alt/⌥</span> : Measure Distances</div>
            <div class="tip-item"><span>Double Click</span> : Live Edit properties</div>
        </div>
    </div>

    <div class="stash-section">
        <div class="stash-header">
            <span>Inspiration Stash</span>
            <span id="stash-count" class="badge">0</span>
        </div>

        <div id="empty-state" class="empty-state">
            Nothing here yet. Inspect an element and press Ctrl/⌘ + S to save.
        </div>

        <div id="stash-container" class="stash-container">
            <!-- Stash items will be injected here via popup.js -->
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
